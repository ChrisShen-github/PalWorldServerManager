name: palworld-server-manager

services:
  manager-api:
    build:
      context: ./backend
    volumes:
      - manager-data:/var/lib/palworld-manager
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  manager-web:
    build:
      context: ./frontend
    depends_on:
      manager-api:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  manager-data:
