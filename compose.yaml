name: palworld-server-manager

services:
  manager:
    image: akwangdao/palworldservermanager:latest
    volumes:
      - ./data:/var/lib/palworld-manager
      - ./host-agent:/opt/palworld-server-manager/host-agent
      - /opt/palworld-server-manager:/host-agent-runtime
      - /run/palworld-server-manager:/run/palworld-server-manager
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 3s
      retries: 3
    restart: unless-stopped
